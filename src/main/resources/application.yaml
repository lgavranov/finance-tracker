spring:
  application:
    name: finance-tracker

  # Zadani aktivni profil; nadjačaj s -Dspring.profiles.active=test|prod
  profiles:
    default: dev

  # PostgreSQL
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/finance}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:finance}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
